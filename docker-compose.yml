services:
  postgres:
    image: postgres:16

    container_name: retailpulse_postgres

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: retailpulse

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:latest

    container_name: retailpulse_metabase

    restart: always

    environment:
      MB_DB_FILE: /metabase-data/metabase.db

    ports:
      - "3000:3000"

    depends_on:
      - postgres

    volumes:
      - metabase_data:/metabase-data

volumes:
  postgres_data:
  metabase_data:
